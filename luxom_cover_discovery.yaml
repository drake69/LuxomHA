# =============================================================================
#  Luxom — SHUTTER DISCOVERY (diagnostic tool, PHASE 1)
# =============================================================================
#  Connects to the DS65L and prints EVERY inbound frame with its parsed address,
#  to find out which M,OO addresses drive each shutter.
#
#  USAGE:
#   1. Fill in secrets.yaml (wifi, mqtt, luxom_host, luxom_port).
#   2. Flash this file:   uv run esphome run luxom_cover_discovery.yaml
#   3. Watch the logs:    uv run esphome logs luxom_cover_discovery.yaml
#      (or in Home Assistant: the "Luxom: recent addresses" entity).
#   4. Walk to a shutter and press UP -> the log shows the UP relay address.
#      Press DOWN -> the DOWN relay address. Write them down.
#   5. Repeat for every shutter, then put them in secrets.yaml:
#         luxom_covers: '"Kitchen|<up>|<down> ; Bedroom|<up>|<down>"'
#      e.g.  luxom_covers: '"Kitchen|2,03|2,04 ; Bedroom|2,05|2,06"'
#   6. Flash the production file luxom_gateway.yaml.
#
#  NOTE: this is a one-off tool. It holds the DS65L socket: do NOT run it
#        together with the production gateway (the IP interface accepts a
#        single TCP client).
# =============================================================================

esphome:
  name: luxom-cover-discovery
  friendly_name: "Luxom Cover Discovery"
  includes:
    - luxom_net.h     # lwip socket headers for the TCP link to the DS65L
    - luxom_proto.h   # pure protocol/helper logic (shared, host-tested)

esp32:
  board: esp32dev
  framework:
    type: arduino

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  id: wifi_comp
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  reboot_timeout: 0s
  fast_connect: true

logger:
  level: INFO

mqtt:
  id: mqtt_client
  broker: !secret mqtt_host
  port: 1883
  username: !secret mqtt_user
  password: !secret mqtt_pass

globals:
  - id: luxom_host
    type: std::string
    restore_value: no
    initial_value: !secret luxom_host
  - id: luxom_port
    type: int
    restore_value: no
    initial_value: !secret luxom_port
  # --- socket and runtime state ---
  - id: lux_fd                   # TCP socket file descriptor (-1 = closed)
    type: int
    restore_value: no
    initial_value: '-1'
  - id: lux_connecting           # non-blocking connect in progress
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: lux_rx
    type: std::string
    restore_value: no
  - id: lux_bus_ready
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: lux_conn_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: lux_handshake_fallback
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: lux_recent          # last activated addresses (rolling, for convenience)
    type: std::string
    restore_value: no

text_sensor:
  - platform: template
    name: "Luxom: last address"
    id: lux_last_addr
  - platform: template
    name: "Luxom: recent addresses"
    id: lux_recent_sensor

binary_sensor:
  - platform: template
    name: "Luxom bus connected"
    id: lux_bus_connected

button:
  - platform: template
    name: "Luxom: clear list"
    icon: mdi:broom
    on_press:
      - lambda: |-
          // reset the rolling list of recently activated addresses
          id(lux_recent) = "";
          id(lux_recent_sensor).publish_state("");
          id(lux_last_addr).publish_state("");

  - platform: restart
    name: "Luxom: restart discovery"

script:
  # send a Luxom frame on the socket (appends the ';' terminator)
  - id: lux_send
    parameters:
      frame: string
    then:
      - lambda: |-
          if (id(lux_fd) < 0 || id(lux_connecting)) return;
          std::string out = frame; out += ';';
          int n = send(id(lux_fd), out.c_str(), out.size(), 0);
          if (n < 0 && errno != EWOULDBLOCK && errno != EAGAIN) {
            close(id(lux_fd)); id(lux_fd) = -1;
          }

  # handle one inbound Luxom frame: handshake, then log every activation address
  - id: lux_on_frame
    parameters:
      frame: string
    then:
      - lambda: |-
          std::string f = frame;
          if (f.empty()) return;
          // handshake
          if (f == luxom::frame::PW_REQUEST) { id(lux_send)->execute(luxom::cmd::REQUEST_INFO); ESP_LOGI("luxom", "handshake @1*PW- -> *?"); return; }
          if (f.rfind(luxom::frame::MODULE_INFO, 0) == 0) { id(lux_bus_ready) = true; ESP_LOGI("luxom", "module info -> bus ready. Press UP/DOWN on the shutters."); return; }
          if (f == luxom::frame::HEARTBEAT || f == luxom::frame::ACK) return;

          // raw log of every frame
          ESP_LOGI("luxom", "frame: %s", f.c_str());

          luxom::Frame fr = luxom::parse_frame(f);
          // frames without an address (e.g. @1*Z) are not relevant for shutters
          if (!fr.has_addr) return;
          std::string op = fr.op;
          std::string addr = fr.addr;  // "M,OO"

          const char* tag = "?";
          if (op == luxom::frame::IN_ON) tag = "ON  (activation)";
          else if (op == luxom::frame::IN_OFF) tag = "OFF (release)";
          else if (op == luxom::frame::IN_DIM) tag = "DIMMER";

          if (op == luxom::frame::IN_ON || op == luxom::frame::IN_DIM) {
            ESP_LOGI("luxom", ">>> ACTIVATION  address = %s   (%s)", addr.c_str(), op.c_str());
            id(lux_last_addr).publish_state(addr);
            // rolling list (keep the last ~10)
            std::string r = id(lux_recent);
            r = addr + "  " + r;
            if (r.size() > 160) r = r.substr(0, 160);
            id(lux_recent) = r;
            id(lux_recent_sensor).publish_state(r);
          } else {
            ESP_LOGI("luxom", "    %s  address = %s", tag, addr.c_str());
          }

interval:
  # TCP connection management to the DS65L + handshake fallback
  - interval: 1s
    then:
      - lambda: |-
          if (!id(wifi_comp).is_connected()) return;

          if (id(lux_fd) < 0) {
            id(lux_bus_ready) = false; id(lux_rx) = ""; id(lux_handshake_fallback) = false;
            id(lux_bus_connected).publish_state(false);
            int fd = ::socket(AF_INET, SOCK_STREAM, 0);
            if (fd < 0) { ESP_LOGW("luxom", "socket() failed (errno %d)", errno); return; }
            int fl = fcntl(fd, F_GETFL, 0); fcntl(fd, F_SETFL, fl | O_NONBLOCK);
            struct sockaddr_in sa; memset(&sa, 0, sizeof(sa));
            sa.sin_family = AF_INET; sa.sin_port = htons((uint16_t) id(luxom_port));
            if (inet_pton(AF_INET, id(luxom_host).c_str(), &sa.sin_addr) != 1) {
              ESP_LOGW("luxom", "bad luxom_host '%s' (must be an IP)", id(luxom_host).c_str());
              close(fd); return;
            }
            int r = connect(fd, (struct sockaddr*) &sa, sizeof(sa));
            id(lux_conn_ms) = millis();
            if (r == 0) { id(lux_fd) = fd; id(lux_connecting) = false;
              ESP_LOGI("luxom", "TCP connected to %s:%d", id(luxom_host).c_str(), id(luxom_port)); }
            else if (errno == EINPROGRESS) { id(lux_fd) = fd; id(lux_connecting) = true;
              ESP_LOGI("luxom", "TCP connecting to %s:%d ...", id(luxom_host).c_str(), id(luxom_port)); }
            else { close(fd); ESP_LOGW("luxom", "TCP connect failed (errno %d)", errno); }
            return;
          }

          if (id(lux_connecting)) {
            fd_set wset; FD_ZERO(&wset); FD_SET(id(lux_fd), &wset);
            struct timeval tv; tv.tv_sec = 0; tv.tv_usec = 0;
            int s = select(id(lux_fd) + 1, NULL, &wset, NULL, &tv);
            if (s > 0 && FD_ISSET(id(lux_fd), &wset)) {
              int err = 0; socklen_t l = sizeof(err);
              getsockopt(id(lux_fd), SOL_SOCKET, SO_ERROR, &err, &l);
              if (err == 0) { id(lux_connecting) = false; id(lux_conn_ms) = millis();
                ESP_LOGI("luxom", "TCP connected to %s:%d", id(luxom_host).c_str(), id(luxom_port)); }
              else { close(id(lux_fd)); id(lux_fd) = -1; ESP_LOGW("luxom", "TCP connect error (errno %d)", err); }
            } else if (millis() - id(lux_conn_ms) > 5000) {
              close(id(lux_fd)); id(lux_fd) = -1; ESP_LOGW("luxom", "TCP connect timeout");
            }
            return;
          }

          id(lux_bus_connected).publish_state(true);
          if (!id(lux_bus_ready) && !id(lux_handshake_fallback) && (millis() - id(lux_conn_ms) > 3000)) {
            id(lux_send)->execute(luxom::cmd::REQUEST_INFO);
            id(lux_handshake_fallback) = true;
            ESP_LOGI("luxom", "handshake fallback: sent *?");
          }

  # socket read pump: accumulate chars and split on ';'
  - interval: 100ms
    then:
      - lambda: |-
          if (id(lux_fd) < 0 || id(lux_connecting)) return;
          char buf[256];
          while (true) {
            int n = recv(id(lux_fd), buf, sizeof(buf), 0);
            if (n > 0) {
              for (int i = 0; i < n; i++) {
                char ch = buf[i];
                if (ch == ';') { id(lux_on_frame)->execute(id(lux_rx)); id(lux_rx) = ""; }
                else if (ch != '\r' && ch != '\n') id(lux_rx) += ch;
              }
              if (n < (int) sizeof(buf)) break;
            } else if (n == 0) {
              close(id(lux_fd)); id(lux_fd) = -1; break;
            } else {
              if (errno == EWOULDBLOCK || errno == EAGAIN) break;
              close(id(lux_fd)); id(lux_fd) = -1; break;
            }
          }
